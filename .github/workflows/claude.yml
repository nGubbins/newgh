name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 10
            --append-system-prompt "When a user asks you to identify issues or problems in the code, 
            analyse the changes and identify the single largest or most critical issue. 
            Describe it clearly, 
            explain why it's a problem, 
            and suggest that the user create a GitHub issue for it by providing a ready-made issue title and description they can copy."
